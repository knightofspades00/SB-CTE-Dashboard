<?xml version="1.0" encoding="UTF-8"?>
<!--
  Placeholder wordmark for the County of San Bernardino.
  Blue + gold approximate the official county seal palette.
  Overwrite with the canonical seal when available; same path/name.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="County of San Bernardino">
  <!-- Shield outline -->
  <path d="M 10 18 L 90 18 L 90 58 Q 90 70 78 78 L 50 92 L 22 78 Q 10 70 10 58 Z"
        fill="#1d3557" stroke="#d4a012" stroke-width="3"/>
  <!-- Top divider -->
  <line x1="20" y1="32" x2="80" y2="32" stroke="rgba(212,160,18,0.55)" stroke-width="1"/>
  <text x="50" y="29" text-anchor="middle"
        fill="#d4a012"
        font-family="'DM Sans', sans-serif"
        font-size="5.5" font-weight="700" letter-spacing="1.5">COUNTY OF</text>
  <text x="50" y="50" text-anchor="middle"
        fill="#ffffff"
        font-family="Fraunces, 'Times New Roman', Georgia, serif"
        font-size="14" font-weight="700" letter-spacing="0.3">San</text>
  <text x="50" y="66" text-anchor="middle"
        fill="#ffffff"
        font-family="Fraunces, 'Times New Roman', Georgia, serif"
        font-size="14" font-weight="700" letter-spacing="0.3">Bernardino</text>
  <text x="50" y="82" text-anchor="middle"
        fill="rgba(255,255,255,0.55)"
        font-family="'DM Sans', sans-serif"
        font-size="4.5" font-weight="500" letter-spacing="1.3">EST. 1853</text>
</svg>
